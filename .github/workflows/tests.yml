name: 'Tests'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  pytest:
    name: '${{ matrix.os }} / ${{ matrix.kind }} / ${{ matrix.python }}'
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash -e {0}
    env:
      PYTHON_VERSION: '${{ matrix.python }}'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.14'
            kind: 'dev'
          - os: ubuntu-latest
            python: '3.10'
            kind: 'stable'
          - os: macos-latest
            python: '3.11'
            kind: 'stable'
          - os: windows-latest
            python: '3.12'
            kind: 'stable'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --progress-bar off -e .[test] pyside6
      - run: python -m pip install --upgrade "mne @ https://github.com/mne-tools/mne-python/archive/refs/heads/main.zip"
        if: matrix.kind == 'dev'
      - run: mne sys_info -p
      - run: python -c "import mne; mne.datasets.testing.data_path(verbose=True)"
      - run: python -c "import pyvista; mne.viz.Brain('fsaverage', subjects_dir=mne.datasets.testing.data_path(verbose=True) / 'subjects')"
      - run: pytest --tb=short --cov=mne_kit_gui --cov-report=xml --cov-report=html -vvv mne_kit_gui
      - uses: codecov/codecov-action@v6
        with:
          token: ebcd818a-7a71-470d-b667-7cd9c3003c7d
        if: success() || failure()
